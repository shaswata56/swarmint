name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install swarmint (dev extras)
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: python run_tests.py

  benchmark:
    # Reproduce the headline claims (federation, Byzantine, inference, relay) on
    # one interpreter — a regression guard for the behaviour, not just the code.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install swarmint (dev extras)
        run: pip install -e ".[dev]"
      - name: Reproduce headline claims
        run: python benchmark.py
